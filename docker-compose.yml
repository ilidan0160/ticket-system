version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: ticket_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-ticket_system}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: ticket_backend
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "5000:5000"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build: 
      context: ./frontend
      args:
        - REACT_APP_API_URL=${API_URL:-http://localhost:5000/api}
        - REACT_APP_SOCKET_URL=${SOCKET_URL:-http://localhost:5000}
    container_name: ticket_frontend
    environment:
      - REACT_APP_API_URL=${API_URL:-http://localhost:5000/api}
      - REACT_APP_SOCKET_URL=${SOCKET_URL:-http://localhost:5000}
    ports:
      - "3005:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
